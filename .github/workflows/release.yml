name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_NET_RETRY: "10"
  CARGO_NET_TIMEOUT: "120"
  RUST_BACKTRACE: "1"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            platform: windows
          - os: ubuntu-22.04
            platform: linux
          - os: macos-14
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri App
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            pnpm tauri build --target universal-apple-darwin
          else
            pnpm tauri build
          fi

      - name: Prepare Release Assets
        shell: bash
        run: |
          mkdir -p release-assets

          if [ "${{ matrix.platform }}" = "windows" ]; then
            find src-tauri/target/release/bundle/msi -name "*.msi" -exec cp {} release-assets/CC-Switch-Setup.msi \; || true
            if [ -f "src-tauri/target/release/cc-switch.exe" ]; then
              mkdir -p temp-portable
              cp src-tauri/target/release/cc-switch.exe temp-portable/
              cd temp-portable && zip -r ../release-assets/CC-Switch-Windows-Portable.zip . && cd ..
              rm -rf temp-portable
            fi
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" | head -1 | xargs -I {} sh -c 'cd "$(dirname "{}")" && zip -r "$GITHUB_WORKSPACE/release-assets/CC-Switch-macOS.zip" "$(basename "{}")"' || true
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            find src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} release-assets/CC-Switch-Linux.deb \; || true
            find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} release-assets/CC-Switch-Linux.AppImage \; || true
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-${{ matrix.platform }}
          path: release-assets/*

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CC-Switch for AiCodeWith ${{ github.ref_name }}
          prerelease: true
          body: |
            ## CC-Switch for AiCodeWith ${{ github.ref_name }}

            СИЊСИ║ [AiCodeWithСИГУйгуФЎ](https://aicodewith.com/) т«џтѕХуџёClaude Code & Codex СЙЏт║ћтЋєтѕЄТЇбтиЦтЁ?
            ### уЅ╣УЅ▓тіЪУЃй

            - жбёуй«AiCodeWithСЙЏт║ћтЋєжЁЇуй«№╝їт╝ђу«▒тЇ│ућ?            - СИЊСИ║тЏйтєЁућеТѕиС╝ўтїќуџёClaude APIСИГУйгТюЇтіА
            - Тћ»ТїЂтюет«ўТќ╣уЎ╗тйЋтњїAiCodeWithТюЇтіАжЌ┤СИђжћ«тѕЄТЇ?            - тЪ║С║јТѕљуєЪуџёCC-SwitchТъХТъё№╝їС┐ЮжџюжЁЇуй«т«ЅтЁ?
            ### СИІУййт«ЅУБЁ

            - **Windows**: `CC-Switch-Setup.msi`№╝ѕт«ЅУБЁуЅѕ№╝Ѕ№╝Џ`CC-Switch-Windows-Portable.zip`№╝ѕу╗┐УЅ▓уЅѕ№╝?            - **macOS**: `CC-Switch-macOS.zip`№╝ѕУДБтјІтЇ│уће№╝Ѕ
            - **Linux**: `CC-Switch-Linux.deb`№╝ѕDEBтїЁ№╝Ѕ№╝Џ`CC-Switch-Linux.AppImage`№╝ѕжђџућеТа╝т╝Ј№╝?
            ### Сй┐ућеУ»┤Тўј

            1. СИІУййт»╣т║ћу│╗у╗Ъуџёт«ЅУБЁтїЁ
            2. У«┐жЌ« [AiCodeWith](https://aicodewith.com/) УјитЈќAPI Token
            3. тюет║ћућеСИГжђЅТІЕжбёуй«уџ?AiCodeWith"СЙЏт║ћтЋєт╣ХтАФтЁЦToken
            4. СИђжћ«тѕЄТЇбтЇ│тЈ»Сй┐ућ?
            ---
            **тЪ║С║јт╝ђТ║љжА╣уЏ?*№╝џForkУЄ?[farion1231/cc-switch](https://github.com/farion1231/cc-switch)№╝їжЂхтЙфMITУ«ИтЈ»У»?          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}